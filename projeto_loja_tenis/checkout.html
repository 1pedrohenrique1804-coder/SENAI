<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — Loja Tênis Importados</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <div class="container checkout-container">
    <h2>Finalizar Pedido</h2>
    <div id="items" class="checkout-items"></div>

    <h3>Dados do cliente</h3>
    <form id="orderForm" class="checkout-form">
      <input id="name" placeholder="Nome completo" required>
      <input id="phone" placeholder="Telefone (WhatsApp)" required>
      <input id="address" placeholder="Endereço de entrega" required>
      <select id="payment">
        <option value="pix">PIX</option>
        <option value="boleto">Boleto</option>
        <option value="card">Cartão (simulado)</option>
      </select>
      <textarea id="notes" placeholder="Observações (opcional)" rows="3"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button type="button" id="sendWhatsapp" class="btn whatsapp">Enviar pedido via WhatsApp</button>
        <button type="button" id="confirm" class="btn">Confirmar (simulado)</button>
        <a href="index.html" class="btn" style="background:#eee;color:#111">Voltar</a>
      </div>
    </form>
  </div>

  <script>
    const CART_KEY = 'loja_cart_v1';
    function getCart(){ return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
    function formatPrice(v){ return 'R$ ' + Number(v).toFixed(2).replace('.',','); }
    const itemsEl = document.getElementById('items');
    const cart = getCart();
    let total = 0;
    if(cart.length===0){ itemsEl.innerHTML = '<p class="muted">Seu carrinho está vazio. Volte à loja para adicionar produtos.</p>'; }
    cart.forEach(it=>{
      total += Number(it.price || 0);
      const div = document.createElement('div'); div.className='checkout-item';
      div.innerHTML = `<img src="${it.img}"><div><strong>${it.title}</strong><div class="muted">R$ ${Number(it.price).toFixed(2).replace('.',',')}</div></div>`;
      itemsEl.appendChild(div);
    });
    const totalDiv = document.createElement('div'); totalDiv.style.marginTop='12px'; totalDiv.innerHTML = '<strong>Total: '+formatPrice(total)+'</strong>';
    itemsEl.appendChild(totalDiv);

    document.getElementById('confirm').addEventListener('click',()=>{
      alert('Pedido simulado recebido — você será redirecionado para a loja. Configure integração real para processar pagamentos.');
      localStorage.removeItem(CART_KEY);
      window.location.href = 'index.html';
    });

    document.getElementById('sendWhatsapp').addEventListener('click',()=>{
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      if(!name || !phone || !address){ alert('Preencha nome, telefone e endereço antes de enviar.'); return; }
      const notes = document.getElementById('notes').value.trim();
      let msg = `Novo pedido de ${name} | Tel: ${phone}\nEndereço: ${address}\n\nItens:\n`;
      cart.forEach((it,i)=>{ msg += `${i+1}. ${it.title} — R$ ${Number(it.price).toFixed(2).replace('.',',')}\n`; });
      msg += `\nTotal: ${formatPrice(total)}\n\nObservações: ${notes}`;
      const meta = document.querySelector('meta[name="whatsapp-number"]');
      const num = (meta?meta.content:'+551199999999').replace(/[^+0-9]/g,'');
      const url = `https://wa.me/${num.replace('+','')}?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
    });
  </script>
</body>
</html>
