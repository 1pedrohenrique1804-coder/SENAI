<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <h1>
        🎮 Margin e Padding — Estilo Gamer
    </h1>

    <main id="azul">
        <p>🎯 Padding: 30px — espaço interno</p>
        <p>O escudo azul cresceu para dentro.</p>
    </main>

    <main id="verde">
        <p>⚔️ Margin: 30px — espaço externo</p>
        <p> O bloco verde se afastou dos outros.</p>
    </main>

    <main id="laranja">
        <p>🔥 Margin: 20px + Padding: 20px</p>
        <p>Margin afasta por fora. Padding cresce por dentro.</p>
    </main>

</body>
</html>
